<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL-Pull</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <h1>URL-Pull</h1>
      </header>

      <section class="controls">
        <div class="buttons-row">
          <button id="export-current-tab">Current Tab</button>
          <button id="export-current-window">Current Window</button>
          <button id="export-all-windows">All Windows</button>
        </div>
        <div class="buttons-row">
          <button id="copy-output">Copy</button>
          <button id="download-md-output">Download MD</button>
          <button id="download-json-output">Download JSON</button>
        </div>
      </section>

      <section class="filters" aria-label="Filters">
        <label><input id="filter-google-search" type="checkbox" checked /> Remove Google Search tabs</label>
        <label><input id="filter-non-http" type="checkbox" checked /> Remove non-http(s) pages</label>
        <label><input id="filter-duplicates" type="checkbox" checked /> Remove duplicate URLs</label>
      </section>

      <section class="context">
        <label for="context-text">Context added to top</label>
        <textarea id="context-text" placeholder="Add text to the top of the export, such as: these are job applications; search and summarize each one." spellcheck="true"></textarea>
      </section>

      <p id="status" class="status">Ready.</p>
      <textarea id="tab-output" placeholder="Tab titles and URLs will appear here..." spellcheck="false"></textarea>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
